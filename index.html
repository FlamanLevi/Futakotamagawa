<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futakotamagawa ES - English Lab</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f9fc;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 40px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        h2 {
            margin: 10px 0 0 0;
            font-size: 1.2rem;
            font-weight: 300;
            color: #bdc3c7;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        p.welcome {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 40px;
        }
        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .grade-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: white;
            border: 2px solid #e0e6ed;
            border-radius: 15px;
            text-decoration: none;
            color: #2c3e50;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .grade-button:hover {
            transform: translateY(-5px);
            border-color: #3498db;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .grade-number {
            font-size: 3rem;
            font-weight: bold;
            color: #3498db;
        }
        .grade-label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 10px;
        }
        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<header>
    <h1>Futakotamagawa Elementary School</h1>
    <h2>世田谷区立二子玉川小学校</h2>
</header>

<div class="container">
    <p class="welcome">Select a grade to start the Bingo Machine</p>
    
    <div class="grade-grid">
        <!-- We link each button to bingo.html -->
        <a href="bingo.html" class="grade-button">
            <span class="grade-number">3</span>
            <span class="grade-label">Grade 3</span>
        </a>

        <a href="bingo.html" class="grade-button">
            <span class="grade-number">4</span>
            <span class="grade-label">Grade 4</span>
        </a>

        <a href="bingo.html" class="grade-button">
            <span class="grade-number">5</span>
            <span class="grade-label">Grade 5</span>
        </a>

        <a href="bingo.html" class="grade-button">
            <span class="grade-number">6</span>
            <span class="grade-label">Grade 6</span>
        </a>
    </div>
</div>

<footer>
    &copy; 2026 Levi Flaman | Designed for classroom use
</footer>

</body>
</html>
